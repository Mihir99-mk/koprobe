name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install eBPF deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build multi-platform binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/koprobe-linux-amd64 ./cmd/koprobe
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/koprobe-linux-arm64 ./cmd/koprobe
          cd dist && sha256sum * > checksums.txt

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Package Helm chart
        run: |
          helm package deploy/helm --destination dist/
          helm repo index dist/ --url https://koprobe.github.io/koprobe/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Koprobe ${{ github.ref_name }}

            ### Installation
            ```bash
            helm repo add koprobe https://koprobe.github.io/koprobe
            helm repo update
            helm install koprobe koprobe/koprobe \
              --namespace monitoring \
              --set cloud.provider=aws \
              --set cloud.region=us-east-1
            ```

            ### Quick binary install
            ```bash
            curl -Lo koprobe https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/koprobe-linux-amd64
            chmod +x koprobe && sudo mv koprobe /usr/local/bin/
            ```
