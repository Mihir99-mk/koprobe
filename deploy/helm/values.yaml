# Koprobe Helm values
# Override these with: helm install koprobe . -f my-values.yaml

image:
  repository: ghcr.io/koprobe/koprobe
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Cloud provider configuration
cloud:
  provider: aws        # aws | gcp | azure
  region: us-east-1

# What to collect
collectors:
  cpu: true
  network: true
  disk: true
  memory: true

# Ports
metrics:
  port: 9090           # Prometheus /metrics

api:
  port: 8080           # REST API

# Slack alerts (optional)
slack:
  enabled: false
  webhookURL: ""       # set via --set slack.webhookURL=https://...

# Prometheus ServiceMonitor (if you use kube-prometheus-stack)
serviceMonitor:
  enabled: false
  interval: 30s
  namespace: monitoring

# Resource limits for the DaemonSet agent
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Node selector — run on all nodes by default
nodeSelector: {}
tolerations:
  - operator: Exists    # tolerate all taints so we run on every node

# eBPF requires these capabilities
securityContext:
  privileged: false
  capabilities:
    add:
      - BPF
      - NET_ADMIN
      - SYS_RESOURCE
      - PERFMON

# Host paths needed to read cgroup hierarchy
hostPaths:
  cgroupRoot: /sys/fs/cgroup
  procRoot: /proc

# Dashboard (optional React UI)
dashboard:
  enabled: true
  port: 3000
  replicaCount: 1
