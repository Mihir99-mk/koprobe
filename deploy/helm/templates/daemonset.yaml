apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "koprobe.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "koprobe.name" . }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "koprobe.name" . }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "koprobe.name" . }}
        app.kubernetes.io/component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "koprobe.fullname" . }}
      hostPID: true       # required to resolve cgroup → pod mappings
      hostNetwork: false

      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}

      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}

      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          args:
            - --cloud={{ .Values.cloud.provider }}
            - --region={{ .Values.cloud.region }}
            - --metrics-port={{ .Values.metrics.port }}
            - --api-port={{ .Values.api.port }}
            - --collect-cpu={{ .Values.collectors.cpu }}
            - --collect-network={{ .Values.collectors.network }}
            - --collect-disk={{ .Values.collectors.disk }}
            - --collect-memory={{ .Values.collectors.memory }}
            {{- if .Values.slack.enabled }}
            - --slack-webhook=$(SLACK_WEBHOOK_URL)
            {{- end }}

          env:
            {{- if .Values.slack.enabled }}
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "koprobe.fullname" . }}-slack
                  key: webhookURL
            {{- end }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP

          securityContext:
            privileged: false
            capabilities:
              add:
                {{- toYaml .Values.securityContext.capabilities.add | nindent 16 }}

          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: bpf
              mountPath: /sys/fs/bpf

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: cgroup
          hostPath:
            path: {{ .Values.hostPaths.cgroupRoot }}
        - name: proc
          hostPath:
            path: {{ .Values.hostPaths.procRoot }}
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
